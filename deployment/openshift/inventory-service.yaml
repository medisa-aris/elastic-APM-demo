apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: elastic-apm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: image-registry.openshift-image-registry.svc:5000/elastic-apm-demo/demo-inventory-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: demo-config
          env:
            - name: OTEL_SERVICE_NAME
              value: demo-inventory-service
            - name: PORT
              value: "8082"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: elastic-apm-demo
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8082
      targetPort: 8082
