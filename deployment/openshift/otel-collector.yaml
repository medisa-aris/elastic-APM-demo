apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: elastic-apm-demo
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
      resource:
        attributes:
          - key: deployment.environment
            value: kubernetes
            action: upsert
    exporters:
      otlp/elastic:
        endpoint: "${env:ELASTIC_APM_SERVER_URL}"
        headers:
          Authorization: "ApiKey ${env:ELASTIC_API_KEY}"
        tls:
          insecure: false
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [otlp/elastic]
        metrics:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [otlp/elastic]
        logs:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [otlp/elastic]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: elastic-apm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.102.0
          args: ["--config=/etc/otelcol-contrib/config.yaml"]
          env:
            - name: ELASTIC_APM_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: demo-secrets
                  key: ELASTIC_APM_SERVER_URL
            - name: ELASTIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-secrets
                  key: ELASTIC_API_KEY
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 13133
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: elastic-apm-demo
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
