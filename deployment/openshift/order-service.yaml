apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: elastic-apm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: image-registry.openshift-image-registry.svc:5000/elastic-apm-demo/demo-order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: demo-config
          env:
            - name: OTEL_SERVICE_NAME
              value: demo-order-service
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: elastic-apm-demo
spec:
  selector:
    app: order-service
  ports:
    - port: 8080
      targetPort: 8080
