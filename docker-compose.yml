version: "3.9"

# Shared OTel environment — merged into each backend service
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  ENVIRONMENT: local

services:
  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: otel-collector
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      ELASTIC_APM_SERVER_URL: ${ELASTIC_APM_SERVER_URL}
      ELASTIC_API_KEY: ${ELASTIC_API_KEY}
      ENVIRONMENT: local
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
      - "13133:13133" # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Inventory Service — Go Gin
  # ---------------------------------------------------------------------------
  inventory-service:
    build:
      context: ./services/inventory-service
    container_name: inventory-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo-inventory-service
      INVENTORY_SLOW_MS: ${INVENTORY_SLOW_MS:-0}
      PORT: "8082"
    volumes:
      - inventory-data:/data
      - ./seed:/seed:ro
    ports:
      - "8082:8082"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Payment Service — Python FastAPI
  # ---------------------------------------------------------------------------
  payment-service:
    build:
      context: ./services/payment-service
    container_name: payment-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo-payment-service
      PAYMENT_FAILURE_RATE: ${PAYMENT_FAILURE_RATE:-0}
      PORT: "8081"
    volumes:
      - payment-data:/data
    ports:
      - "8081:8081"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Order Service — Java Spring Boot
  # ---------------------------------------------------------------------------
  order-service:
    build:
      context: ./services/order-service
    container_name: order-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo-order-service
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Gateway — Node.js Express
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ./gateway
    container_name: gateway
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: demo-gateway
      ORDER_SERVICE_URL: http://order-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend — Next.js + Elastic RUM
  # NEXT_PUBLIC_* vars must be build ARGs (baked into browser bundle at build time)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_ELASTIC_APM_SERVER_URL: ${NEXT_PUBLIC_ELASTIC_APM_SERVER_URL}
        NEXT_PUBLIC_ELASTIC_APM_SERVICE_NAME: ${NEXT_PUBLIC_ELASTIC_APM_SERVICE_NAME:-demo-frontend}
        NEXT_PUBLIC_ELASTIC_APM_ENVIRONMENT: ${NEXT_PUBLIC_ELASTIC_APM_ENVIRONMENT:-local}
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:4000
    container_name: frontend
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  inventory-data:
  payment-data:
