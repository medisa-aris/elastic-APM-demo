spring.application.name=demo-order-service
server.port=${PORT:8080}

# H2 in-memory database — resets on restart (ideal for demos)
spring.datasource.url=jdbc:h2:mem:orders;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Actuator health endpoint
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# OpenTelemetry
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.protocol=grpc
otel.service.name=${OTEL_SERVICE_NAME:demo-order-service}
otel.resource.attributes=deployment.environment=${ENVIRONMENT:local}
