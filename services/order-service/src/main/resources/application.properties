spring.application.name=demo-order-service
server.port=${PORT:8080}

# H2 in-memory database — resets on restart (ideal for demos)
spring.datasource.url=jdbc:h2:mem:orders;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Actuator health endpoint
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# OpenTelemetry — micrometer-tracing bridge (Spring Boot 3 native)
# Sample every request for the demo
management.tracing.sampling.probability=1.0

# OTLP exporter endpoint (HTTP/protobuf — append /v1/traces to the base URL)
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Service name tag on every span
spring.application.name=demo-order-service
