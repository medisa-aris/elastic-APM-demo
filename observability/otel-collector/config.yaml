receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:ENVIRONMENT}
        action: upsert

exporters:
  # Elastic Cloud APM Server via OTLP (native support since Elastic Stack 8.0+)
  otlp/elastic:
    endpoint: "${env:ELASTIC_APM_SERVER_URL}"
    headers:
      Authorization: "ApiKey ${env:ELASTIC_API_KEY}"
    tls:
      insecure: false

  # Debug output — helpful during initial setup
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/elastic]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/elastic]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/elastic]
