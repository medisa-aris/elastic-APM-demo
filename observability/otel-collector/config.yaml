receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:ENVIRONMENT}
        action: upsert

exporters:
  # Elastic Cloud APM Server via OTLP HTTP (accepts full https:// URL)
  # Use otlphttp, not otlp/grpc, so that ELASTIC_APM_SERVER_URL can be the
  # standard https://... URL shown in the Elastic Cloud console.
  otlphttp/elastic:
    endpoint: "${env:ELASTIC_APM_SERVER_URL}"
    headers:
      Authorization: "ApiKey ${env:ELASTIC_API_KEY}"
    tls:
      insecure: false

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/elastic]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/elastic]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/elastic]
